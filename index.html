<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agriturismo Imperia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: #fff;
      color: #222;
      font-family: "Poppins", sans-serif;
    }

    main {
      width: 100%;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(72vw, 260px);
      height: auto;
      margin: 0 auto 28px;
    }

    .subtitle {
      margin: 0;
      color: #222;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 600;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <img src="ape-ligustica-logo.png" alt="Ape Ligustica" class="logo">
    <p class="subtitle">Agriturismo Imperia</p>
  </main>
</body>
</html>
