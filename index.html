<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agriturismo Imperia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: #fff;
      color: #222;
      font-family: "Poppins", sans-serif;
    }

    main {
      width: 100%;
      text-align: center;
      animation: fadeInUp 900ms ease-out both;
    }

    .logo {
      display: block;
      width: min(72vw, 260px);
      height: auto;
      margin: 0 auto 30px;
      animation: logoFloat 4.5s ease-in-out infinite;
    }

    .subtitle {
      margin: 0;
      color: #2f2f2f;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 600;
      line-height: 1.35;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 22px 0 0;
      color: #3a3a3a;
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      line-height: 1.5;
    }

    .contacts a {
      color: inherit;
      text-decoration: none;
    }

    .contacts a:hover,
    .contacts a:focus {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes logoFloat {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      main,
      .logo {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="ape-ligustica-logo.png" alt="Logo Ape Ligustica" class="logo">
    <p class="subtitle">Agriturismo Imperia</p>
    <div class="contacts" aria-label="Contatti">
      <a href="mailto:info@example.com">info@example.com</a>
      <a href="tel:+390000000000">+39 000 000 0000</a>
    </div>
  </main>
</body>
</html>
